<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>荧光青绿超高亮反应堆</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center}
canvas{background:#000}
</style>
</head>
<body>
<canvas width="420" height="420" id="canvas"></canvas>
<script>
const c = document.getElementById("canvas");
const ctx = c.getContext("2d");
const w = c.width, h = c.height;
const cx = w / 2, cy = h / 2;
let t = 0;
function draw(){
  t += 0.016;
  // 呼吸幅度大幅加大：0.55 → 0.85，亮度范围 [0.15, 1.85]
  // 配合 sin² 非线性曲线，让"吸气-呼气"节奏更明显（暗时更久，亮时瞬间爆发）
  const bRaw = Math.sin(t * 1.9) * 0.85 + 1;
  const breath = Math.pow(bRaw, 1.6);
  ctx.clearRect(0,0,w,h);

  // 金属外环（线宽 ×2：22 → 44，厚重感 ×2，恒亮不呼吸）
  ctx.beginPath();
  ctx.arc(cx, cy, 184, 0, Math.PI*2);
  ctx.lineWidth = 44;
  ctx.strokeStyle="#050505";
  ctx.stroke();
  // 内圈荧光环（恒亮，不参与呼吸）
  ctx.beginPath();
  ctx.arc(cx, cy, 158, 0, Math.PI*2);
  ctx.lineWidth = 12;
  ctx.strokeStyle="rgba(40,255,180,0.85)";
  ctx.stroke();

  // 细密旋转能量条（选择能量条）已移除

  // 外圈大范围荧光溢散（恒亮，不参与呼吸）
  const outerGlow = ctx.createRadialGradient(cx,cy,70,cx,cy,210);
  outerGlow.addColorStop(0,"rgba(30,240,160,0.65)");
  outerGlow.addColorStop(1,"rgba(0,90,60,0)");
  ctx.beginPath();
  ctx.arc(cx,cy,210,0,Math.PI*2);
  ctx.fillStyle = outerGlow;
  ctx.fill();

  // 中层强光（半径稍增，亮度峰值更高，呼吸更明显）
  const midGrad = ctx.createRadialGradient(cx,cy,42,cx,cy,100);
  midGrad.addColorStop(0,`rgba(50,255,190,${breath*1.15})`);
  midGrad.addColorStop(1,"rgba(0,120,80,0)");
  ctx.beginPath();
  ctx.arc(cx,cy,100,0,Math.PI*2);
  ctx.fillStyle = midGrad;
  ctx.fill();

  // 纯白高亮中心（中心峰值大幅提升，呼吸形成强烈明暗闪烁）
  const coreGrad = ctx.createRadialGradient(cx,cy,0,cx,cy,55);
  coreGrad.addColorStop(0,`rgba(255,255,255,${breath*2.2})`);
  coreGrad.addColorStop(0.5,`rgba(40,245,180,${breath*1.4})`);
  coreGrad.addColorStop(1,"rgba(0,100,70,0)");
  ctx.beginPath();
  ctx.arc(cx,cy,55,0,Math.PI*2);
  ctx.fillStyle = coreGrad;
  ctx.fill();

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
