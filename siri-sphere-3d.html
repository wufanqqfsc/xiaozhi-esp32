<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siri Sphere 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #050508;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        #canvas { display: block; cursor: pointer; }
        
        .hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            letter-spacing: 1px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="hint">鼠标移动控制视角 · 点击开启/关闭粒子特效</div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
/**
 * ═══════════════════════════════════════════════════════════════════════════════
 * Siri Sphere 3D - 炫彩玻璃球形交互光效
 * ═══════════════════════════════════════════════════════════════════════════════
 * 
 * 特性:
 * - 真正3D立体球体 + 4层弧形光带
 * - 粒子系统环绕
 * - 鼠标视角控制
 * - 分层模糊渲染
 */

// ═══════════════════════════════════════════════════════════════════════════════
// 配置
// ═══════════════════════════════════════════════════════════════════════════════
const CONFIG = {
    sphere: {
        radius: 3,
        segments: 64,
        color: 0x0a0a12,
        opacity: 0.92
    },
    
    bands: [
        { radius: 1.15, thickness: 0.12, color: 0x9333ea, alpha: 0.75, blur: 0.08 },
        { radius: 1.32, thickness: 0.14, color: 0x3b82f6, alpha: 0.8, blur: 0.10 },
        { radius: 1.48, thickness: 0.16, color: 0x22d3bb, alpha: 0.82, blur: 0.12 },
        { radius: 1.62, thickness: 0.18, color: 0xec4899, alpha: 0.85, blur: 0.14 },
    ],
    
    particles: {
        count: 2000,
        size: 0.04,
        colors: [0x9333ea, 0x3b82f6, 0x22d3bb, 0xec4899, 0xffffff],
        speed: 0.3,
        orbitRadius: [2, 5]
    },
    
    outerGlow: {
        colors: [0x9333ea, 0x3b82f6, 0x22d3bb, 0xec4899],
        blur: 1.5,
        opacity: 0.3
    },
    
    breathing: {
        enabled: true,
        speed: 0.015,
        amplitude: 0.08
    }
};

// ═══════════════════════════════════════════════════════════════════════════════
// 场景初始化
// ═══════════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ 
    canvas, 
    antialias: true, 
    alpha: true 
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 12;

const clock = new THREE.Clock();

// ═══════════════════════════════════════════════════════════════════════════════
// 主球体 (磨砂玻璃)
// ═══════════════════════════════════════════════════════════════════════════════
const sphereGeo = new THREE.SphereGeometry(CONFIG.sphere.radius, CONFIG.sphere.segments, CONFIG.sphere.segments);
const sphereMat = new THREE.MeshPhysicalMaterial({
    color: CONFIG.sphere.color,
    transparent: true,
    opacity: CONFIG.sphere.opacity,
    roughness: 0.9,
    metalness: 0.1,
    transmission: 0.1,
    thickness: 2,
    clearcoat: 0.3,
    clearcoatRoughness: 0.8,
});
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
scene.add(sphere);

// 内部发光核心
const coreGeo = new THREE.SphereGeometry(CONFIG.sphere.radius * 0.8, 32, 32);
const coreMat = new THREE.MeshBasicMaterial({
    color: 0x1a1a2e,
    transparent: true,
    opacity: 0.5
});
const core = new THREE.Mesh(coreGeo, coreMat);
sphere.add(core);

// ═══════════════════════════════════════════════════════════════════════════════
// 4层弧形光带
// ═══════════════════════════════════════════════════════════════════════════════
const bandMeshes = [];

CONFIG.bands.forEach((band, i) => {
    // 创建弧形几何体 (Torus)
    const curve = new THREE.EllipseCurve(0, 0, band.radius, band.radius, 0, Math.PI * 1.7, false);
    const points = curve.getPoints(50);
    const tubeGeo = new THREE.TubeGeometry(
        new THREE.CatmullRomCurve3(points.map(p => new THREE.Vector3(p.x, p.y, 0))),
        50, band.thickness, 16, false
    );
    
    const bandMat = new THREE.MeshBasicMaterial({
        color: band.color,
        transparent: true,
        opacity: band.alpha,
    });
    
    const bandMesh = new THREE.Mesh(tubeGeo, bandMat);
    
    // 错位和倾斜
    bandMesh.rotation.x = Math.PI / 2 + (i - 1.5) * 0.3;
    bandMesh.rotation.z = i * Math.PI * 0.35;
    bandMesh.userData = { 
        baseRotZ: bandMesh.rotation.z,
        index: i,
        speed: 0.15 - i * 0.02
    };
    
    sphere.add(bandMesh);
    bandMeshes.push(bandMesh);
    
    // 光晕效果
    const glowGeo = new THREE.TorusGeometry(band.radius, band.thickness * 2, 8, 50);
    const glowMat = new THREE.MeshBasicMaterial({
        color: band.color,
        transparent: true,
        opacity: band.alpha * 0.3,
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.rotation.x = bandMesh.rotation.x;
    glow.rotation.z = bandMesh.rotation.z;
    glow.userData.isGlow = true;
    bandMesh.add(glow);
});

// ═══════════════════════════════════════════════════════════════════════════════
// 外圈柔光层
// ═══════════════════════════════════════════════════════════════════════════════
const glowGroup = new THREE.Group();
scene.add(glowGroup);

CONFIG.outerGlow.colors.forEach((color, i) => {
    const size = 5 + i * 0.8;
    const glowGeo = new THREE.SphereGeometry(size, 32, 32);
    const glowMat = new THREE.MeshBasicMaterial({
        color,
        transparent: true,
        opacity: CONFIG.outerGlow.opacity - i * 0.05,
        side: THREE.BackSide
    });
    const glowMesh = new THREE.Mesh(glowGeo, glowMat);
    glowMesh.userData.baseOpacity = glowMat.opacity;
    glowGroup.add(glowMesh);
});

// ═══════════════════════════════════════════════════════════════════════════════
// 粒子系统
// ═══════════════════════════════════════════════════════════════════════════════
let particlesEnabled = true;
const particleCount = CONFIG.particles.count;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);
const sizes = new Float32Array(particleCount);
const velocities = [];

const colorPalette = CONFIG.particles.colors.map(c => new THREE.Color(c));

for (let i = 0; i < particleCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const radius = CONFIG.particles.orbitRadius[0] + 
                   Math.random() * (CONFIG.particles.orbitRadius[1] - CONFIG.particles.orbitRadius[0]);
    
    positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = radius * Math.cos(phi);
    
    const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
    colors[i * 3] = color.r;
    colors[i * 3 + 1] = color.g;
    colors[i * 3 + 2] = color.b;
    
    sizes[i] = CONFIG.particles.size * (0.5 + Math.random());
    
    velocities.push({
        theta: theta,
        phi: phi,
        radius: radius,
        speed: CONFIG.particles.speed * (0.5 + Math.random()),
        bobSpeed: Math.random() * 2,
        bobAmount: Math.random() * 0.5
    });
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

const particleMat = new THREE.PointsMaterial({
    size: CONFIG.particles.size,
    vertexColors: true,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending,
    sizeAttenuation: true
});

const particleSystem = new THREE.Points(particleGeo, particleMat);
scene.add(particleSystem);

// ═══════════════════════════════════════════════════════════════════════════════
// 中心高光
// ═══════════════════════════════════════════════════════════════════════════════
const highlightGeo = new THREE.SphereGeometry(CONFIG.sphere.radius * 0.35, 32, 32);
const highlightMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.9
});
const highlight = new THREE.Mesh(highlightGeo, highlightMat);
highlight.position.set(-CONFIG.sphere.radius * 0.25, CONFIG.sphere.radius * 0.25, CONFIG.sphere.radius * 0.5);
sphere.add(highlight);

// 高光光晕
const highlightGlowGeo = new THREE.SphereGeometry(CONFIG.sphere.radius * 0.5, 16, 16);
const highlightGlowMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.3
});
const highlightGlow = new THREE.Mesh(highlightGlowGeo, highlightGlowMat);
highlight.add(highlightGlow);

// ═══════════════════════════════════════════════════════════════════════════════
// 状态
// ═══════════════════════════════════════════════════════════════════════════════
let time = 0;
let mouseX = 0, mouseY = 0;
let targetX = 0, targetY = 0;
let autoRotate = true;
let hoverSpeed = 1;

// ═══════════════════════════════════════════════════════════════════════════════
// 事件
// ═══════════════════════════════════════════════════════════════════════════════
canvas.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    autoRotate = false;
    hoverSpeed = 2.5;
});

canvas.addEventListener('mouseleave', () => {
    autoRotate = true;
    hoverSpeed = 1;
});

canvas.addEventListener('click', () => {
    particlesEnabled = !particlesEnabled;
    particleSystem.visible = particlesEnabled;
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════════════════════════════════════
// 动画
// ═══════════════════════════════════════════════════════════════════════════════
function animate() {
    requestAnimationFrame(animate);
    
    const delta = clock.getDelta();
    time += delta;
    
    // 呼吸效果
    const breath = CONFIG.breathing.enabled 
        ? 1 + Math.sin(time * CONFIG.breathing.speed * 60) * CONFIG.breathing.amplitude 
        : 1;
    
    // 球体脉动
    sphere.scale.setScalar(breath);
    
    // 鼠标视角控制
    targetX += (mouseX * 0.5 - targetX) * 0.05;
    targetY += (-mouseY * 0.3 - targetY) * 0.05;
    
    if (autoRotate) {
        targetX += 0.002;
    }
    
    sphere.rotation.y = targetX;
    sphere.rotation.x = targetY;
    
    // 光带旋转
    const speedMult = hoverSpeed + (autoRotate ? 0 : 0);
    bandMeshes.forEach((band, i) => {
        band.rotation.z += band.userData.speed * speedMult * delta;
        band.children.forEach(child => {
            if (child.userData.isGlow) {
                child.material.opacity = CONFIG.bands[i].alpha * 0.3 * breath;
            }
        });
    });
    
    // 外圈光晕
    glowGroup.children.forEach((glow, i) => {
        glow.position.copy(sphere.position);
        glow.material.opacity = glow.userData.baseOpacity * breath;
    });
    
    // 高光脉动
    highlight.material.opacity = 0.8 + Math.sin(time * 3) * 0.15;
    highlightGlow.scale.setScalar(1 + Math.sin(time * 2) * 0.1);
    
    // 粒子动画
    if (particlesEnabled) {
        const particlePositions = particleSystem.geometry.attributes.position;
        
        for (let i = 0; i < particleCount; i++) {
            const vel = velocities[i];
            
            vel.theta += vel.speed * speedMult * delta;
            
            const bob = Math.sin(time * vel.bobSpeed + i) * vel.bobAmount;
            const r = vel.radius * breath;
            
            particlePositions.array[i * 3] = r * Math.sin(vel.phi) * Math.cos(vel.theta);
            particlePositions.array[i * 3 + 1] = r * Math.sin(vel.phi) * Math.sin(vel.theta) + bob;
            particlePositions.array[i * 3 + 2] = r * Math.cos(vel.phi);
        }
        
        particlePositions.needsUpdate = true;
        particleSystem.rotation.y += 0.001;
    }
    
    // 相机轻微跟随
    camera.position.x = targetX * 2;
    camera.position.y = -targetY * 1.5;
    camera.lookAt(0, 0, 0);
    
    renderer.render(scene, camera);
}

// 启动
animate();
    </script>
</body>
</html>
