<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Man Arc Reactor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%);
            overflow: hidden;
        }
        #canvas { display: block; cursor: pointer; }
        
        .label {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 150, 255, 0.5);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="label">Arc Reactor MK-VII</div>
    
    <script>
/**
 * ═══════════════════════════════════════════════════════════════════════════════
 * Iron Man Arc Reactor - 钢铁侠胸口能量环特效
 * ═══════════════════════════════════════════════════════════════════════════════
 * 
 * 特性:
 * - 多层同心能量环
 * - 旋转三角形核心
 * - 能量弧光
 * - 脉冲波纹
 * - 粒子喷射
 */

// ═══════════════════════════════════════════════════════════════════════════════
// 配置
// ═══════════════════════════════════════════════════════════════════════════════
const CONFIG = {
    // 能量核心颜色 (蓝色到青色)
    coreColor: { r: 0, g: 180, b: 255 },
    
    // 外圈颜色 (橙色/金色)
    outerColor: { r: 255, g: 150, b: 50 },
    
    // 环参数
    rings: [
        { radius: 0.18, thickness: 0.015, color: 'core', blur: 0, alpha: 1.0 },
        { radius: 0.25, thickness: 0.012, color: 'core', blur: 4, alpha: 0.9 },
        { radius: 0.35, thickness: 0.010, color: 'core', blur: 6, alpha: 0.8 },
        { radius: 0.48, thickness: 0.008, color: 'outer', blur: 8, alpha: 0.7 },
        { radius: 0.62, thickness: 0.006, color: 'outer', blur: 12, alpha: 0.5 },
    ],
    
    // 三角形核心
    triangles: 6,
    triangleSpeed: 0.5,
    
    // 呼吸动画
    breathing: {
        enabled: true,
        speed: 0.03,
        amplitude: 0.15
    },
    
    // 粒子
    particles: {
        count: 500,
        size: 3,
        speed: 0.8
    },
    
    // 脉冲波
    pulses: {
        count: 3,
        speed: 1.5
    }
};

// ═══════════════════════════════════════════════════════════════════════════════
// 主类
// ═══════════════════════════════════════════════════════════════════════════════
class ArcReactor {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.time = 0;
        this.pulseTime = 0;
        this.particles = [];
        
        this.resize();
        this.initParticles();
        this.bindEvents();
        this.animate();
    }
    
    resize() {
        const dpr = window.devicePixelRatio || 1;
        const size = Math.min(window.innerWidth, window.innerHeight) * 0.8;
        
        this.canvas.width = size * dpr;
        this.canvas.height = size * dpr;
        this.canvas.style.width = size + 'px';
        this.canvas.style.height = size + 'px';
        
        this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        
        this.cx = size / 2;
        this.cy = size / 2;
        this.baseRadius = size * 0.35;
    }
    
    bindEvents() {
        window.addEventListener('resize', () => this.resize());
        this.canvas.addEventListener('click', () => this.initParticles());
    }
    
    // ──────────────────────────────── 粒子系统 ────────────────────────────────
    initParticles() {
        this.particles = [];
        for (let i = 0; i < CONFIG.particles.count; i++) {
            this.particles.push(this.createParticle());
        }
    }
    
    createParticle(fromCenter = false) {
        const angle = Math.random() * Math.PI * 2;
        const dist = fromCenter ? Math.random() * 0.3 : 0.4 + Math.random() * 0.5;
        
        return {
            x: Math.cos(angle) * dist,
            y: Math.sin(angle) * dist,
            angle: angle,
            dist: dist,
            speed: (Math.random() * 0.5 + 0.5) * CONFIG.particles.speed,
            size: CONFIG.particles.size * (0.3 + Math.random() * 0.7),
            life: Math.random(),
            maxLife: 0.5 + Math.random() * 0.5,
            fromCenter: fromCenter,
            wobble: Math.random() * Math.PI * 2
        };
    }
    
    updateParticles() {
        this.particles.forEach((p, i) => {
            p.life -= 0.008;
            
            if (p.life <= 0) {
                this.particles[i] = this.createParticle(p.fromCenter);
                return;
            }
            
            if (p.fromCenter) {
                // 从中心向外喷射
                p.dist += p.speed * 0.02;
                p.angle += 0.02;
                p.wobble += 0.1;
                p.x = Math.cos(p.angle) * p.dist + Math.sin(p.wobble) * 0.02;
                p.y = Math.sin(p.angle) * p.dist + Math.cos(p.wobble) * 0.02;
            } else {
                // 轨道运动
                p.angle += p.speed * 0.01;
                p.dist = 0.4 + Math.sin(p.angle * 2) * 0.1;
                p.x = Math.cos(p.angle) * p.dist;
                p.y = Math.sin(p.angle) * p.dist;
            }
        });
    }
    
    drawParticles() {
        const breath = this.getBreath();
        
        this.particles.forEach(p => {
            const x = this.cx + p.x * this.baseRadius;
            const y = this.cy + p.y * this.baseRadius;
            const alpha = p.life * 0.8;
            const size = p.size * (0.5 + p.life * 0.5) * breath;
            
            // 外发光
            const gradient = this.ctx.createRadialGradient(x, y, 0, x, y, size * 3);
            const c = CONFIG.coreColor;
            gradient.addColorStop(0, `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha})`);
            gradient.addColorStop(0.5, `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha * 0.3})`);
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            this.ctx.fillStyle = gradient;
            this.ctx.beginPath();
            this.ctx.arc(x, y, size * 3, 0, Math.PI * 2);
            this.ctx.fill();
            
            // 核心亮点
            this.ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
            this.ctx.beginPath();
            this.ctx.arc(x, y, size * 0.3, 0, Math.PI * 2);
            this.ctx.fill();
        });
    }
    
    // ──────────────────────────────── 能量环 ────────────────────────────────
    drawRings() {
        const breath = this.getBreath();
        
        CONFIG.rings.forEach((ring, i) => {
            const r = this.baseRadius * ring.radius * breath;
            const color = ring.color === 'core' ? CONFIG.coreColor : CONFIG.outerColor;
            const c = color;
            
            this.ctx.save();
            
            // 外发光
            this.ctx.shadowColor = `rgba(${c.r}, ${c.g}, ${c.b}, 0.8)`;
            this.ctx.shadowBlur = ring.blur * 3;
            
            // 主环
            this.ctx.beginPath();
            this.ctx.arc(this.cx, this.cy, r, 0, Math.PI * 2);
            this.ctx.strokeStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${ring.alpha * breath})`;
            this.ctx.lineWidth = ring.thickness * this.baseRadius;
            this.ctx.lineCap = 'round';
            this.ctx.stroke();
            
            // 内环高光
            if (ring.blur > 0) {
                this.ctx.shadowBlur = ring.blur * 0.5;
                this.ctx.strokeStyle = `rgba(255, 255, 255, ${ring.alpha * 0.3 * breath})`;
                this.ctx.lineWidth = ring.thickness * this.baseRadius * 0.3;
                this.ctx.stroke();
            }
            
            this.ctx.restore();
        });
    }
    
    // ──────────────────────────────── 三角形核心 ────────────────────────────────
    drawTriangles() {
        const breath = this.getBreath();
        const rotation = this.time * CONFIG.triangleSpeed;
        
        for (let t = 0; t < CONFIG.triangles; t++) {
            const angle = rotation + (t * Math.PI * 2 / CONFIG.triangles);
            const size = this.baseRadius * 0.12 * breath;
            
            this.ctx.save();
            this.ctx.translate(this.cx, this.cy);
            this.ctx.rotate(angle);
            
            // 三角形
            this.ctx.beginPath();
            for (let i = 0; i < 3; i++) {
                const a = (i * Math.PI * 2 / 3) - Math.PI / 2;
                const x = Math.cos(a) * size;
                const y = Math.sin(a) * size;
                if (i === 0) this.ctx.moveTo(x, y);
                else this.ctx.lineTo(x, y);
            }
            this.ctx.closePath();
            
            // 发光
            this.ctx.shadowColor = `rgba(${CONFIG.coreColor.r}, ${CONFIG.coreColor.g}, ${CONFIG.coreColor.b}, 0.9)`;
            this.ctx.shadowBlur = 15;
            this.ctx.strokeStyle = `rgba(${CONFIG.coreColor.r}, ${CONFIG.coreColor.g}, ${CONFIG.coreColor.b}, 0.8)`;
            this.ctx.lineWidth = 2;
            this.ctx.stroke();
            
            // 填充
            this.ctx.fillStyle = `rgba(${CONFIG.coreColor.r}, ${CONFIG.coreColor.g}, ${CONFIG.coreColor.b}, 0.3)`;
            this.ctx.fill();
            
            this.ctx.restore();
        }
        
        // 中心三角形 (静止)
        const centerSize = this.baseRadius * 0.08 * breath;
        this.ctx.save();
        this.ctx.translate(this.cx, this.cy);
        
        this.ctx.beginPath();
        for (let i = 0; i < 3; i++) {
            const a = (i * Math.PI * 2 / 3) - Math.PI / 2;
            const x = Math.cos(a) * centerSize;
            const y = Math.sin(a) * centerSize;
            if (i === 0) this.ctx.moveTo(x, y);
            else this.ctx.lineTo(x, y);
        }
        this.ctx.closePath();
        
        this.ctx.shadowColor = 'rgba(0, 200, 255, 1)';
        this.ctx.shadowBlur = 20;
        this.ctx.fillStyle = 'rgba(0, 200, 255, 0.9)';
        this.ctx.fill();
        
        // 白核
        this.ctx.shadowBlur = 10;
        this.ctx.fillStyle = 'rgba(255, 255, 255, 1)';
        this.ctx.beginPath();
        this.ctx.arc(0, 0, centerSize * 0.3, 0, Math.PI * 2);
        this.ctx.fill();
        
        this.ctx.restore();
    }
    
    // ──────────────────────────────── 脉冲波纹 ────────────────────────────────
    drawPulses() {
        const pulseSpeed = CONFIG.pulses.speed;
        
        for (let i = 0; i < CONFIG.pulses.count; i++) {
            const t = (this.pulseTime * pulseSpeed + i / CONFIG.pulses.count) % 1;
            const r = this.baseRadius * (0.1 + t * 0.7);
            const alpha = (1 - t) * 0.5;
            const width = (1 - t) * 3 + 1;
            
            if (alpha <= 0) continue;
            
            this.ctx.save();
            this.ctx.beginPath();
            this.ctx.arc(this.cx, this.cy, r, 0, Math.PI * 2);
            this.ctx.strokeStyle = `rgba(0, 180, 255, ${alpha})`;
            this.ctx.lineWidth = width;
            this.ctx.stroke();
            this.ctx.restore();
        }
    }
    
    // ──────────────────────────────── 能量弧光 ────────────────────────────────
    drawArcs() {
        const breath = this.getBreath();
        const arcCount = 8;
        
        for (let i = 0; i < arcCount; i++) {
            const angle = (this.time * 0.3 + i * Math.PI * 2 / arcCount) % (Math.PI * 2);
            const length = 0.3 + Math.sin(angle * 3 + this.time) * 0.15;
            
            const x1 = this.cx + Math.cos(angle) * this.baseRadius * 0.2;
            const y1 = this.cy + Math.sin(angle) * this.baseRadius * 0.2;
            const x2 = this.cx + Math.cos(angle) * this.baseRadius * length;
            const y2 = this.cy + Math.sin(angle) * this.baseRadius * length;
            
            this.ctx.save();
            
            // 渐变线
            const gradient = this.ctx.createLinearGradient(x1, y1, x2, y2);
            gradient.addColorStop(0, `rgba(0, 200, 255, ${0.8 * breath})`);
            gradient.addColorStop(1, `rgba(0, 200, 255, 0)`);
            
            this.ctx.beginPath();
            this.ctx.moveTo(x1, y1);
            this.ctx.lineTo(x2, y2);
            this.ctx.strokeStyle = gradient;
            this.ctx.lineWidth = 2 * breath;
            this.ctx.lineCap = 'round';
            this.ctx.stroke();
            
            // 端点发光
            this.ctx.shadowColor = 'rgba(0, 200, 255, 1)';
            this.ctx.shadowBlur = 10;
            this.ctx.fillStyle = `rgba(255, 255, 255, ${0.9 * breath})`;
            this.ctx.beginPath();
            this.ctx.arc(x2, y2, 2, 0, Math.PI * 2);
            this.ctx.fill();
            
            this.ctx.restore();
        }
    }
    
    // ──────────────────────────────── 外圈装饰 ────────────────────────────────
    drawOuterRing() {
        const breath = this.getBreath();
        const r = this.baseRadius * 0.7;
        
        // 外圈刻度
        const marks = 36;
        for (let i = 0; i < marks; i++) {
            const angle = (i / marks) * Math.PI * 2;
            const isLong = i % 3 === 0;
            const inner = r * (isLong ? 0.95 : 0.97);
            const outer = r * 1.05;
            
            const x1 = this.cx + Math.cos(angle) * inner;
            const y1 = this.cy + Math.sin(angle) * inner;
            const x2 = this.cx + Math.cos(angle) * outer;
            const y2 = this.cy + Math.sin(angle) * outer;
            
            this.ctx.save();
            this.ctx.beginPath();
            this.ctx.moveTo(x1, y1);
            this.ctx.lineTo(x2, y2);
            this.ctx.strokeStyle = `rgba(${CONFIG.outerColor.r}, ${CONFIG.outerColor.g}, ${CONFIG.outerColor.b}, ${0.3 + Math.sin(angle * 8 + this.time * 2) * 0.2})`;
            this.ctx.lineWidth = isLong ? 2 : 1;
            this.ctx.stroke();
            this.ctx.restore();
        }
        
        // 外圈光环
        this.ctx.save();
        this.ctx.shadowColor = `rgba(${CONFIG.outerColor.r}, ${CONFIG.outerColor.g}, ${CONFIG.outerColor.b}, 0.5)`;
        this.ctx.shadowBlur = 20;
        this.ctx.beginPath();
        this.ctx.arc(this.cx, this.cy, r * 1.08, 0, Math.PI * 2);
        this.ctx.strokeStyle = `rgba(${CONFIG.outerColor.r}, ${CONFIG.outerColor.g}, ${CONFIG.outerColor.b}, ${0.4 * breath})`;
        this.ctx.lineWidth = 3;
        this.ctx.stroke();
        this.ctx.restore();
    }
    
    // ──────────────────────────────── 辅助函数 ────────────────────────────────
    getBreath() {
        if (!CONFIG.breathing.enabled) return 1;
        return 1 + Math.sin(this.time * CONFIG.breathing.speed * 60) * CONFIG.breathing.amplitude;
    }
    
    // ──────────────────────────────── 主渲染 ────────────────────────────────
    render() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        // 分层渲染
        this.drawPulses();        // 脉冲波
        this.drawOuterRing();     // 外圈装饰
        this.drawRings();         // 能量环
        this.drawArcs();          // 能量弧光
        this.drawParticles();     // 粒子
        this.drawTriangles();     // 三角形核心
    }
    
    animate() {
        this.time += 0.016;
        this.pulseTime += 0.016;
        this.updateParticles();
        this.render();
        requestAnimationFrame(() => this.animate());
    }
}

// 启动
window.addEventListener('DOMContentLoaded', () => {
    new ArcReactor(document.getElementById('canvas'));
});
    </script>
</body>
</html>
